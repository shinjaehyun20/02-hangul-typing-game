<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="t d"><title id="t">장윤이 한글 타이핑 게임</title><desc id="d">난이도를 고르고 한글 낱말을 입력해 정확도와 등급을 받는 학습 흐름.</desc><defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#f5f1ff"/><stop offset="1" stop-color="#e8f7ff"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#403477" flood-opacity=".18"/></filter></defs><rect width="1280" height="640" rx="40" fill="url(#bg)"/><circle cx="1080" cy="60" r="230" fill="#7c5cfc" opacity=".12"/><circle cx="40" cy="620" r="200" fill="#4fd1c5" opacity=".12"/>
